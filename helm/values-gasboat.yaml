beads3d:
  daemon:
    url: http://gasboat-beads:8080
  daemonTokenSecret: kd-beads-token
  enabled: true
  image:
    pullPolicy: Always
    repository: ghcr.io/groblegark/beads3d
    tag: latest
  imagePullSecrets:
    - name: ghcr-registry
  ingress:
    basicAuth:
      enabled: true
      secret: gasboat-basic-auth
    enabled: true
    host: beads3d.gasboat.app.e2e.dev.fics.ai
    ipWhitelist:
      enabled: false
  nodeSelector:
    kubernetes.io/arch: amd64
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
agents:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: per-mr
                operator: DoesNotExist
  agentServiceAccount:
    create: true
    name: gasboat-agent
  agentStorageClass: gp2
  claudeModel: claude-opus-4-6
  clusterAdmin:
    enabled: true
    name: gasboat-agent-cluster-admin
  coopBurstLimit: 3
  coopMaxPods: 0
  enabled: true
  # Per-project secrets (Claude OAuth, git, GitHub, GitLab, RWX, etc.) are
  # declared on project beads and auto-reconciled by the controller.
  image:
    repository: ghcr.io/groblegark/gasboat/controller
  nodeSelector:
    kubernetes.io/arch: amd64
beads:
  image:
    pullPolicy: IfNotPresent
    repository: ghcr.io/groblegark/kbeads
  ingress:
    enabled: true
    host: beads.gasboat.app.e2e.dev.fics.ai
    ipWhitelist:
      enabled: false
    rateLimit:
      average: 50
      burst: 100
      enabled: true
  nodeSelector:
    kubernetes.io/arch: amd64
  replicaCount: 1
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 256Mi
  service:
    grpcPort: 9090
    httpPort: 8080
    type: ClusterIP
  tokenSecret: kd-beads-token
coopmux:
  credentials:
    accountName: anthropic-oauth
    provider: anthropic
    reauth: false
  enabled: true
  image:
    pullPolicy: IfNotPresent
    repository: ghcr.io/groblegark/coop
  ingress:
    basicAuth:
      enabled: true
      secret: ""
    bearerToken: 7ae73f938e1790dadcc261ddc9be6b279f445d7a40b40a5e325a5397e37ced5c
    enabled: true
    exposeAPI: true
    host: coopmux.gasboat.app.e2e.dev.fics.ai
    ipWhitelist:
      enabled: false
  mux:
    port: 9800
  nodeSelector:
    kubernetes.io/arch: amd64
  persistence:
    enabled: true
    size: 100Mi
    storageClass: gp2
  replicaCount: 1
externalSecrets:
  beadsToken:
    property: ""
    remoteRef: gasboat/kd-beads-token
  enabled: true
  postgresPassword:
    property: password
    remoteRef: gasboat/postgres-password
  refreshInterval: 15m
  secretStoreKind: ClusterSecretStore
  secretStoreName: aws-secretsmanager
global:
  basicAuth:
    secret: gasboat-basic-auth
imagePullSecrets:
  - name: ghcr-registry
jiraBridge:
  enabled: true
  image:
    pullPolicy: IfNotPresent
    repository: ghcr.io/groblegark/gasboat/jira-bridge
  jira:
    baseURL: https://pihealth.atlassian.net
    boatProjects: monorepo=placeholder:PE,monorepo=placeholder:DEVOPS
    email: matthew.baker@pihealth.ai
    issueTypes: Bug,Task,Story,Epic
    pollInterval: 60s
    projects: PE,DEVOPS
    secretName: jira-api-token
    statuses: To Do,Ready for Development
  logLevel: debug
  nodeSelector:
    kubernetes.io/arch: amd64
  replicaCount: 1
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  service:
    port: 8091
    type: ClusterIP
landing:
  enabled: true
  ingress:
    basicAuth:
      enabled: true
      secret: gasboat-basic-auth
    enabled: true
    host: gasboat.app.e2e.dev.fics.ai
    ipWhitelist:
      enabled: false
nats:
  auth:
    enabled: false
  enabled: true
  image:
    registry: public.ecr.aws
    repository: docker/library/nats
    tag: 2.10-alpine
  jetstream:
    maxMemory: 256M
  persistence:
    enabled: true
    size: 2Gi
    storageClass: gp2
  replicas: 1
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
postgres:
  database: beads
  enabled: true
  image:
    pullPolicy: IfNotPresent
    repository: postgres
    tag: 17-alpine
  nodeSelector:
    kubernetes.io/arch: amd64
  persistence:
    enabled: true
    size: 10Gi
    storageClass: gp2
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 256Mi
registrySecrets:
  enabled: true
  refreshInterval: 1h
  registries:
    ghcr-registry:
      enabled: true
      hosts:
        - ghcr.io
      remoteRef: shared-devops-ghcr.io-credentials
  secretStoreKind: ClusterSecretStore
  secretStoreName: aws-secretsmanager
slackBridge:
  enabled: true
  image:
    repository: ghcr.io/groblegark/gasboat/slack-bridge
  logLevel: debug
  nodeSelector:
    kubernetes.io/arch: amd64
  replicaCount: 1
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  service:
    port: 8090
    type: ClusterIP
  slack:
    channel: C0AHE7C0E1G
    secretName: slack-bot-credentials
    threadingMode: "agent"
tls:
  dns:
    target: k8s-tenantsy-traefikn-3262dde0b9-f3980e040346c573.elb.us-east-1.amazonaws.com
  domainName: '*.gasboat.app.e2e.dev.fics.ai'
  enabled: true
  issuer: letsencrypt-production
gitlabBridge:
  enabled: true
  image:
    pullPolicy: Always
    repository: ghcr.io/groblegark/gasboat/gitlab-bridge
    tag: main
  gitlab:
    baseURL: https://gitlab.com
    secretName: gitlab-token
    secretKey: token
    groupID: "14176856"
    pollInterval: 5m
  ingress:
    enabled: true
    host: gitlab-bridge.gasboat.app.e2e.dev.fics.ai
    ipWhitelist:
      enabled: false
  logLevel: debug
  nodeSelector:
    kubernetes.io/arch: amd64
  replicaCount: 1
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  service:
    port: 8092
    type: ClusterIP
