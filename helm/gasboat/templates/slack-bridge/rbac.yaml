{{- if and .Values.slackBridge.enabled .Values.slackBridge.gate.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "gasboat.fullname" . }}-slack-bridge
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gasboat.labels" . | nindent 4 }}
    app.kubernetes.io/component: slack-bridge
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "gasboat.fullname" . }}-slack-bridge-gate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gasboat.labels" . | nindent 4 }}
    app.kubernetes.io/component: slack-bridge
rules:
  - apiGroups: ["traefik.io"]
    resources: ["middlewares"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "gasboat.fullname" . }}-slack-bridge-gate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gasboat.labels" . | nindent 4 }}
    app.kubernetes.io/component: slack-bridge
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "gasboat.fullname" . }}-slack-bridge-gate
subjects:
  - kind: ServiceAccount
    name: {{ include "gasboat.fullname" . }}-slack-bridge
    namespace: {{ .Release.Namespace }}
{{- end }}
