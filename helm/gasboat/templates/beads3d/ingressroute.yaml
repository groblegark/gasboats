{{- if and .Values.beads3d.enabled .Values.beads3d.ingress.enabled }}
{{- $fullname := include "gasboat.beads3d.fullname" . -}}
{{- $host := .Values.beads3d.ingress.host -}}
{{- $port := .Values.beads3d.service.port | default 80 -}}
{{- $pathPrefix := .Values.beads3d.ingress.pathPrefix | default "" -}}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ $fullname }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gasboat.beads3d.labels" . | nindent 4 }}
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`{{ $host }}`){{ if $pathPrefix }} && PathPrefix(`{{ $pathPrefix }}`){{ end }}
      kind: Rule
      priority: 100
      services:
        - name: {{ $fullname }}
          port: {{ $port }}
      {{- if or $pathPrefix .Values.beads3d.ingress.ipWhitelist.enabled .Values.beads3d.ingress.basicAuth.enabled }}
      middlewares:
        {{- if $pathPrefix }}
        - name: {{ $fullname }}-stripprefix
        {{- end }}
        {{- if .Values.beads3d.ingress.ipWhitelist.enabled }}
        - name: {{ $fullname }}-ipwhitelist
        {{- end }}
        {{- if .Values.beads3d.ingress.basicAuth.enabled }}
        - name: {{ $fullname }}-basicauth
        {{- end }}
      {{- end }}
  {{- if .Values.tls.enabled }}
  tls:
    secretName: {{ include "gasboat.fullname" . }}-wildcard-tls
  {{- end }}
{{- if $pathPrefix }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ $fullname }}-stripprefix
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gasboat.beads3d.labels" . | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - {{ $pathPrefix }}
{{- end }}
{{- if .Values.beads3d.ingress.ipWhitelist.enabled }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ $fullname }}-ipwhitelist
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gasboat.beads3d.labels" . | nindent 4 }}
spec:
  ipWhiteList:
    sourceRange:
      {{- toYaml .Values.beads3d.ingress.ipWhitelist.sourceRange | nindent 6 }}
{{- end }}
{{- if .Values.beads3d.ingress.basicAuth.enabled }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ $fullname }}-basicauth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gasboat.beads3d.labels" . | nindent 4 }}
spec:
  basicAuth:
    secret: {{ include "gasboat.basicAuth.secret" (dict "local" .Values.beads3d.ingress.basicAuth.secret "global" .Values.global.basicAuth.secret) }}
{{- end }}
{{- end }}
