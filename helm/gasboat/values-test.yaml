# Gasboat Test Overlay
# Deploy: helm install gasboat-test helm/gasboat/ -n gasboat-test -f helm/gasboat/values-test.yaml
#
# Prerequisites:
#   1. Create namespace: kubectl create namespace gasboat-test
#   2. Create Slack creds secret:
#      kubectl create secret generic gasboat-test-slack-creds \
#        --namespace gasboat-test \
#        --from-literal=bot-token=xoxb-... \
#        --from-literal=app-token=xapp-... \
#        --from-literal=signing-secret=...
#   3. Create postgres password secret:
#      kubectl create secret generic gasboat-test-postgres-password \
#        --namespace gasboat-test \
#        --from-literal=password=testpassword
#   4. Create beads daemon token secret:
#      kubectl create secret generic gasboat-test-beads-token \
#        --namespace gasboat-test \
#        --from-literal=token=test-token-change-me

# Disable components not needed for testing.
agents:
  enabled: false

coopmux:
  enabled: false

adviceViewer:
  enabled: false

beads3d:
  enabled: false

jiraBridge:
  enabled: false

gitlabBridge:
  enabled: false

landing:
  enabled: false

# External secrets not available in test namespace — use manual secrets.
externalSecrets:
  enabled: false

registrySecrets:
  enabled: false

# Enable in-chart PostgreSQL for the beads daemon.
postgres:
  enabled: true
  database: beads
  passwordSecret: gasboat-test-postgres-password
  persistence:
    enabled: true
    size: 1Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

# Enable NATS for event-driven bridge subscriptions.
nats:
  enabled: true
  replicas: 1
  jetstream:
    maxMemory: "64M"
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Enable beads daemon.
beads:
  replicaCount: 1
  tokenSecret: gasboat-test-beads-token
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

# Enable slack bridge in test mode.
slackBridge:
  enabled: true

  logLevel: debug

  slack:
    secretName: gasboat-test-slack-creds
    channel: ""        # Set to your #gasboat-test channel ID (C...)
    threadingMode: "agent"

  dashboard:
    enabled: true
    channel: ""        # Same as above, or a separate dashboard channel

  persistence:
    enabled: true
    size: 100Mi

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
