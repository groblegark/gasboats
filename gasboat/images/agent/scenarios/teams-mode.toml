# teams-mode.toml
#
# Claudeless scenario: Verify agent teams mode settings materialization
#
# Validates that when CLAUDE_TEAMS_ENABLED=true:
#   1. gb setup claude injects CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1
#      into ~/.claude/settings.json env block
#   2. Workspace hooks include TaskCompleted and TeammateIdle relay hooks
#   3. Agent can access TeamCreate, TaskCreate, SendMessage tools
#
# Run with:
#   CLAUDE_TEAMS_ENABLED=true BOAT_COMMAND="claudeless run /scenarios/teams-mode.toml" \
#     /entrypoint.sh
#
# Verification: after the scenario completes, check:
#   - ~/.claude/settings.json has env.CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS = "1"
#   - {workspace}/.claude/settings.json has hooks.TaskCompleted and hooks.TeammateIdle

[claude]
session_id = "00000000-0000-4000-a000-000000000003"
username = "mock-team-lead"
permission_mode = "accept-edits"
trusted = true
logged_in = true

[claude.timeouts]
hook_timeout_ms = 15000

# ── Initial nudge: verify teams setup ─────────────────────────────────
[[responses]]
on = { contains = "gb ready" }
say = "Teams mode verification: checking settings materialization. Let me verify the user settings have the teams flag."
tools = [
  { name = "Bash", input = { command = "cat ~/.claude/settings.json | jq -r '.env.CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS // \"NOT_SET\"'" } }
]

# ── Verify hooks ──────────────────────────────────────────────────────
[[responses]]
on = { contains = "verification" }
say = "Now verifying workspace hooks include team event relay."
tools = [
  { name = "Bash", input = { command = "cat /home/agent/workspace/.claude/settings.json | jq '.hooks.TaskCompleted, .hooks.TeammateIdle'" } }
]

# ── Generic response ──────────────────────────────────────────────────
[[responses]]
on = "*"
say = "Teams mode verification complete. All settings materialized correctly."

[default]
say = "Mock team lead standing by."

[tools]
mode = "live"

[tools.Bash]
approve = true
