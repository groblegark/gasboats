{{- if and .Values.beads3d.enabled .Values.beads3d.externalSecret.enabled .Values.beads3d.externalSecret.remoteRef }}
# Beads3D daemon authentication token from secret store
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "gasboat.beads3d.fullname" . }}-daemon-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gasboat.beads3d.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.beads3d.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.beads3d.externalSecret.secretStoreName }}
    kind: {{ .Values.beads3d.externalSecret.secretStoreKind }}
  target:
    name: {{ include "gasboat.beads3d.fullname" . }}-daemon-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: {{ .Values.beads3d.externalSecret.remoteRef | quote }}
        {{- if .Values.beads3d.externalSecret.property }}
        property: {{ .Values.beads3d.externalSecret.property | quote }}
        {{- end }}
{{- end }}
