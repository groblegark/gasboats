{{- if .Values.landing.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gasboat.landing.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gasboat.landing.labels" . | nindent 4 }}
spec:
  type: {{ .Values.landing.service.type }}
  ports:
    - port: {{ .Values.landing.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "gasboat.landing.selectorLabels" . | nindent 4 }}
{{- end }}
