{{- if and .Values.agents.enabled .Values.agents.mezmoServiceKeySecret .Values.agents.mezmoServiceKeyExternalSecret.enabled }}
# Mezmo MCP service key from external secret store for agent pods (observability log analysis)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.agents.mezmoServiceKeySecret }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gasboat.agents.labels" $ | nindent 4 }}
spec:
  refreshInterval: {{ .Values.agents.mezmoServiceKeyExternalSecret.refreshInterval | default "15m" }}
  secretStoreRef:
    kind: {{ .Values.agents.mezmoServiceKeyExternalSecret.secretStoreKind | default "ClusterSecretStore" }}
    name: {{ .Values.agents.mezmoServiceKeyExternalSecret.secretStoreName }}
  target:
    name: {{ .Values.agents.mezmoServiceKeySecret }}
    creationPolicy: Owner
    template:
      type: Opaque
      metadata: {}
      data:
        token: '{{`{{ .token }}`}}'
  data:
    - secretKey: token
      remoteRef:
        key: {{ .Values.agents.mezmoServiceKeyExternalSecret.remoteRef | quote }}
        property: {{ .Values.agents.mezmoServiceKeyExternalSecret.tokenProperty | default "token" | quote }}
{{- end }}
