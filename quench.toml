# Quench configuration for gasboats monorepo
# Run `quench config` for reference documentation
version = 1

[git]
baseline = "notes"

[git.commit]
check = "error"

[ratchet]
check = "error"
coverage = true
escapes = true

# --- Checks ---

[check.cloc]
check = "warn"
max_lines = 800
max_lines_test = 500
max_tokens = 6000
exclude = [
  "gasboat/helm/**",
  "gasboat/images/**",
  "gasboat/tests/e2e/**",
  "beads3d/node_modules/**",
  "coop/target/**",
]

[check.escapes]
check = "error"

[[check.escapes.patterns]]
name = "panic"
pattern = "\\bpanic\\("
action = "comment"
comment = "// PANIC:"
in_tests = "allow"
advice = "Add a // PANIC: comment explaining why panic is acceptable here."

[check.agents]
check = "warn"
files = ["CLAUDE.md"]
required = ["CLAUDE.md"]
max_lines = false
max_tokens = false
sync = false

[check.docs]
check = "warn"

[check.docs.toc]
check = "warn"
include = ["**/*.md"]
exclude = ["gasboat/helm/**", "beads3d/node_modules/**"]

[check.docs.links]
check = "warn"
include = ["**/*.md"]
exclude = ["gasboat/helm/**", "beads3d/node_modules/**"]

[check.tests]
check = "warn"
auto = true

[check.tests.commit]
check = "warn"
scope = "branch"
exclude = ["**/main.go", "gasboat/helm/**", "gasboat/images/**"]

[[check.tests.suite]]
runner = "go"

[check.tests.time]
check = "warn"

[check.license]
check = "off"

# --- Languages ---

[golang]
source = ["**/*.go"]
tests = ["**/*_test.go"]
ignore = ["vendor/"]

[golang.cloc]
check = "warn"

[golang.suppress]
check = "comment"

[golang.suppress.test]
check = "allow"

[rust]
source = ["**/*.rs"]
tests = ["**/*_test.rs", "**/tests/**/*.rs"]
ignore = ["target/"]

[shell]
cloc.check = "warn"
